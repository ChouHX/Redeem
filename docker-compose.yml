services:
  outlook-manager-node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: outlook-manager-node
    ports:
      - "5002:5002"
    environment:
      NODE_BACKEND_HOST: 0.0.0.0
      NODE_BACKEND_PORT: 5002
      DB_PATH: /app/data/outlook_manager.db
      ADMIN_TOKEN: ${ADMIN_TOKEN:-admin123}
      ADMIN_PATH: ${ADMIN_PATH:-admin}
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5002/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
